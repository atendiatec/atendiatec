  <text x="740" y="55" font-family="Segoe UI, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Application Security</text>
  <text x="740" y="80" font-family="Segoe UI, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Pentest e analise de vulnerabilidades</text>
  <line x1="640" y1="95" x2="840" y2="95" stroke="#334155" stroke-width="1"/>
  <text x="620" y="118" font-family="monospace" font-size="11" fill="#94a3b8">Web App Pentest (OWASP/PTES)</text>
  <text x="620" y="138" font-family="monospace" font-size="11" fill="#94a3b8">API Security (REST + GraphQL)</text>
  <text x="620" y="158" font-family="monospace" font-size="11" fill="#94a3b8">Auth bypass / IDOR / BAC</text>
  <text x="620" y="178" font-family="monospace" font-size="11" fill="#94a3b8">Burp Suite + custom scripts</text>
  <text x="620" y="198" font-family="monospace" font-size="11" fill="#94a3b8">Relatorio tecnico + executivo</text>
  <text x="620" y="218" font-family="monospace" font-size="11" fill="#94a3b8">Grey box / Black box</text>
