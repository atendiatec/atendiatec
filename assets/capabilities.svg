  <text x="445" y="55" font-family="Segoe UI, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">SaaS Multi-Tenant</text>
  <text x="445" y="80" font-family="Segoe UI, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Plataformas white-label escalaveis</text>
  <line x1="350" y1="95" x2="540" y2="95" stroke="#334155" stroke-width="1"/>
  <text x="330" y="118" font-family="monospace" font-size="11" fill="#94a3b8">Isolamento por tenant</text>
  <text x="330" y="138" font-family="monospace" font-size="11" fill="#94a3b8">Dashboard admin + cliente</text>
  <text x="330" y="158" font-family="monospace" font-size="11" fill="#94a3b8">Billing e controle de custos</text>
  <text x="330" y="178" font-family="monospace" font-size="11" fill="#94a3b8">Integracao GHL / CRM</text>
  <text x="330" y="198" font-family="monospace" font-size="11" fill="#94a3b8">Widget embeddavel (iframe)</text>
  <text x="330" y="218" font-family="monospace" font-size="11" fill="#94a3b8">Deploy Docker + Traefik</text>

  <!-- Card 3: Security -->
  <rect x="600" y="20" width="280" height="220" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
