<svg width="900" height="380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>

  <rect width="900" height="380" rx="10" fill="url(#bg2)"/>
  
  <!-- Title -->
  <text x="450" y="30" font-family="Segoe UI, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">LigaIA — Architecture</text>

  <!-- Row 1: WhatsApp -->
  <rect x="320" y="45" width="260" height="40" rx="8" fill="url(#green)" opacity="0.9"/>
  <text x="450" y="70" font-family="Segoe UI, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">WhatsApp (Meta API / WaVoIP)</text>

  <!-- Arrow -->
  <line x1="450" y1="85" x2="450" y2="105" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="445,102 455,102 450,110" fill="#475569"/>

  <!-- Row 2: SIP Bridge -->
  <rect x="350" y="110" width="200" height="40" rx="8" fill="url(#orange)" opacity="0.9"/>
  <text x="450" y="135" font-family="Segoe UI, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Asterisk SIP Bridge</text>

  <!-- Arrows to voice engines -->
  <polygon points="345,165 355,165 350,172" fill="#475569"/>
  <line x1="350" y1="150" x2="350" y2="165" stroke="#475569" stroke-width="2"/>
  <polygon points="545,165 555,165 550,172" fill="#475569"/>
  <line x1="550" y1="150" x2="550" y2="165" stroke="#475569" stroke-width="2"/>

  <!-- Row 3: Voice Engines -->
  <rect x="200" y="172" width="240" height="50" rx="8" fill="url(#purple)" opacity="0.9"/>
  <text x="320" y="193" font-family="Segoe UI, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">Pipecat (Custom)</text>
  <text x="320" y="212" font-family="monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">Deepgram + Claude + ElevenLabs</text>

  <rect x="460" y="172" width="240" height="50" rx="8" fill="url(#blue)" opacity="0.9"/>
  <text x="580" y="193" font-family="Segoe UI, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">Retell AI (Managed)</text>
  <text x="580" y="212" font-family="monospace" font-size="11" fill="#93c5fd" text-anchor="middle">SIP Trunk — All-in-one</text>

  <!-- Arrow to backend -->
  <polygon points="445,237 455,237 450,244" fill="#475569"/>
  <line x1="450" y1="222" x2="450" y2="237" stroke="#475569" stroke-width="2"/>

  <!-- Row 4: Backend -->
  <rect x="150" y="244" width="600" height="50" rx="8" fill="url(#blue)" opacity="0.15" stroke="#3b82f6" stroke-width="1"/>
  <text x="450" y="265" font-family="Segoe UI, sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle" font-weight="bold">Fastify Backend (Node.js + TypeScript)</text>
  <text x="450" y="284" font-family="monospace" font-size="11" fill="#64748b" text-anchor="middle">Auth | Tenants | Agents | Calls | Costs | Scheduling | Webhooks | Realtime</text>

  <!-- Row 5: Data + Frontend -->
  <!-- Arrow -->
  <polygon points="295,308 305,308 300,316" fill="#475569"/>
  <line x1="300" y1="294" x2="300" y2="308" stroke="#475569" stroke-width="2"/>
  <polygon points="595,308 605,308 600,316" fill="#475569"/>
  <line x1="600" y1="294" x2="600" y2="308" stroke="#475569" stroke-width="2"/>

  <rect x="150" y="316" width="300" height="45" rx="8" fill="url(#blue)" opacity="0.15" stroke="#475569" stroke-width="1"/>
  <text x="300" y="337" font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="middle">PostgreSQL | Redis | MinIO</text>
  <text x="300" y="353" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">Data Layer</text>

  <rect x="500" y="316" width="250" height="45" rx="8" fill="url(#purple)" opacity="0.15" stroke="#8b5cf6" stroke-width="1"/>
  <text x="625" y="337" font-family="Segoe UI, sans-serif" font-size="13" fill="#c4b5fd" text-anchor="middle" font-weight="bold">Next.js 15 Dashboard</text>
  <text x="625" y="353" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">Admin | Tenant | Widget GHL</text>

  <!-- Stats -->
  <rect x="20" y="50" width="130" height="25" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="85" y="67" font-family="monospace" font-size="11" fill="#3b82f6" text-anchor="middle">14 containers</text>
  
  <rect x="20" y="85" width="130" height="25" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="85" y="102" font-family="monospace" font-size="11" fill="#8b5cf6" text-anchor="middle">77 tests</text>
  
  <rect x="20" y="120" width="130" height="25" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="85" y="137" font-family="monospace" font-size="11" fill="#10b981" text-anchor="middle">245+ commits</text>

  <rect x="20" y="155" width="130" height="25" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="85" y="172" font-family="monospace" font-size="11" fill="#f59e0b" text-anchor="middle">15 modules</text>
</svg>
