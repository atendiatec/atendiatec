<svg width="900" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="900" height="100" rx="10" fill="url(#bgm)"/>

  <!-- Metric 1 -->
  <rect x="20" y="15" width="200" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="120" y="45" font-family="Segoe UI, sans-serif" font-size="28" fill="#3b82f6" text-anchor="middle" font-weight="bold">250+</text>
  <text x="120" y="68" font-family="Segoe UI, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Commits em producao</text>

  <!-- Metric 2 -->
  <rect x="240" y="15" width="200" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="340" y="45" font-family="Segoe UI, sans-serif" font-size="28" fill="#8b5cf6" text-anchor="middle" font-weight="bold">15+</text>
  <text x="340" y="68" font-family="Segoe UI, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Modulos backend</text>

  <!-- Metric 3 -->
  <rect x="460" y="15" width="200" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="560" y="45" font-family="Segoe UI, sans-serif" font-size="28" fill="#10b981" text-anchor="middle" font-weight="bold">8+</text>
  <text x="560" y="68" font-family="Segoe UI, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Integracoes externas</text>

  <!-- Metric 4 -->
  <rect x="680" y="15" width="200" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="780" y="45" font-family="Segoe UI, sans-serif" font-size="28" fill="#ef4444" text-anchor="middle" font-weight="bold">OWASP</text>
  <text x="780" y="68" font-family="Segoe UI, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Metodologia de pentest</text>
</svg>
